name: Deploy Website

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout website
        uses: actions/checkout@v4

      - name: Checkout Donna tools
        uses: actions/checkout@v4
        with:
          repository: donna-lang/donna
          path: .donna-tools/donna

      - name: Checkout Leaf
        uses: actions/checkout@v4
        with:
          repository: NikolasSkyl/leaf
          path: .donna-tools/leaf

      - name: Install build tools and QBE
        shell: bash
        run: |
          set -euo pipefail
          sudo apt-get update
          sudo apt-get install -y build-essential git make unzip
          make -C .donna-tools/donna install-qbe
          qbe --version || true

      - name: Install Donna
        shell: bash
        run: |
          set -euo pipefail
          api="https://api.github.com/repos/donna-lang/donna/releases/latest"
          url=$(curl -fsSL "$api" | grep browser_download_url | grep -E 'linux.*(x86_64|amd64).*\.(tar\.gz|tgz|zip)' | head -n 1 | cut -d '"' -f 4)
          if [ -z "$url" ]; then
            echo "Could not find a Linux x86_64 Donna release artifact in donna-lang/donna" >&2
            exit 1
          fi
          mkdir -p "$HOME/.donna/bin" donna-release
          curl -fsSL "$url" -o donna-release/archive
          case "$url" in
            *.zip) unzip -q donna-release/archive -d donna-release ;;
            *) tar -xzf donna-release/archive -C donna-release ;;
          esac
          bin=$(find donna-release -type f -name donna -perm -111 | head -n 1)
          if [ -z "$bin" ]; then
            echo "Donna binary not found in release artifact" >&2
            exit 1
          fi
          cp "$bin" "$HOME/.donna/bin/donna"
          chmod +x "$HOME/.donna/bin/donna"
          echo "$HOME/.donna/bin" >> "$GITHUB_PATH"

      - name: Build Leaf
        shell: bash
        run: |
          set -euo pipefail
          cd .donna-tools/leaf
          donna build
          echo "$PWD/build/bin" >> "$GITHUB_PATH"

      - name: Build website
        shell: bash
        run: |
          set -euo pipefail
          rm -rf public
          leaf build
          test -f public/index.html
          test -f public/CNAME

      - name: Configure GitHub Pages
        uses: actions/configure-pages@v5

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: public

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build

    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
